---
- name: Fetch variables from ServiceNow
  hosts: localhost
  gather_facts: no

  vars_files:
    - ../vars/servicenow.yml

  tasks:
    - import_tasks: fetch_servicenow.yml

    - name: Show extracted values
      debug:
        msg:
          - "Username: {{ username }}"
          - "Server IP: {{ server_ip }}"
          - "Group: {{ user_group }}"

    - name: Add dynamic host
      add_host:
        name: target_server
        ansible_host: "{{ server_ip }}"
        ansible_user: ec2-user
        ansible_ssh_private_key_file: ~/.ssh/id_rsa
        username: "{{ username }}"
        user_group: "{{ user_group }}"

# ✅ PLAY 2

- name: Create Linux User
  hosts: target_server
  become: yes
  gather_facts: no

  roles:
    - create_user

# ✅ PLAY 3

- name: Update ServiceNow Ticket
  hosts: localhost
  gather_facts: no

  vars_files:
    - ../vars/servicenow.yml

  tasks:
    - name: Get RITM details again
      uri:
        url: "https://{{ snow_instance }}/api/now/table/sc_req_item?sysparm_query=number={{ ritm_number }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        return_content: yes
      register: ritm_data

    - name: Extract sys_id
      set_fact:
        ritm_sys_id: "{{ ritm_data.json.result[0].sys_id }}"

    - name: Update Work Notes and Close Request
      uri:
        url: "https://{{ snow_instance }}/api/now/table/sc_req_item/{{ ritm_sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        headers:
          Content-Type: "application/json"
        body_format: json
        body:
          work_notes: "✅ User {{ username }} created successfully on {{ server_ip }} and added to {{ user_group }}"
          state: "3"
        status_code: 200
